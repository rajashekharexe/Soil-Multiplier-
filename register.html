<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/kad-multiplier-cropped.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - KAD Multiplier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
</head>
<body class="login-page">
  <div class="login-container">
    
    <!-- Left Side: Product Image Placeholder -->
    <div class="login-left" style="position: relative; padding: 0;">
      <img src="public/login-bg.png" alt="Login Background" style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <!-- Right Side: Login Form -->
    <div class="login-right">
      <div class="login-form-wrapper">
        <a href="index.html" class="login-logo-link">
          <div class="login-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
              <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
          </div>
        </a>

        <div class="login-header">
          <h1>Create Account</h1>
          <p>Join us to multiply your harvest.</p>
        </div>

        <div id="auth-error" class="auth-error" style="display: none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <span id="auth-error-text">Please fill out all fields.</span>
        </div>

        <form class="login-form" action="#" method="POST">
          <div class="form-group" id="name-group">
            <input type="text" id="name" class="form-input" placeholder=" " required>
            <label for="name" class="form-label">Full Name</label>
          </div>

          <div class="form-group" id="phone-group">
            <input type="tel" id="phone" class="form-input" placeholder=" " pattern="[0-9]*" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
            <label for="phone" class="form-label">Phone Number</label>
          </div>

          <div class="form-group password-group">
            <!-- Left Orange Blob -->
            <div id="blob-left" class="blob-character" style="position: absolute; left: -90px; top: -20px; cursor: grab; z-index: 10;">
              <svg viewBox="0 0 100 100" width="80" height="80" style="overflow: visible; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
                <!-- Body -->
                <path d="M20 80 Q10 50 30 20 Q50 0 70 20 Q90 50 80 80 Q50 100 20 80 Z" fill="#f47844" />
                <!-- Eyes Background -->
                <g class="blob-eyes-bg">
                  <circle cx="37" cy="45" r="6" fill="#fff" />
                  <circle cx="63" cy="45" r="6" fill="#fff" />
                </g>
                <!-- Pupils (These will move) -->
                <g class="blob-eyes">
                  <circle cx="37" cy="45" r="3" fill="#2d3748" />
                  <circle cx="63" cy="45" r="3" fill="#2d3748" />
                </g>
                <!-- Mouth -->
                <path d="M45 55 Q50 60 55 55" fill="none" stroke="#2d3748" stroke-width="2.5" stroke-linecap="round" />
                <!-- Hands -->
                <circle class="blob-hand-l" cx="20" cy="75" r="8" fill="#f47844" stroke="#2d3748" stroke-width="1.5" />
                <circle class="blob-hand-r" cx="80" cy="75" r="8" fill="#f47844" stroke="#2d3748" stroke-width="1.5" />
              </svg>
            </div>

            <!-- Right Purple Blob -->
            <div id="blob-right" class="blob-character" style="position: absolute; right: -90px; top: -20px; cursor: grab; z-index: 10;">
              <svg viewBox="0 0 100 100" width="80" height="80" style="overflow: visible; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
                <!-- Body -->
                <path d="M15 75 Q0 40 25 15 Q50 -5 75 15 Q100 40 85 75 Q50 100 15 75 Z" fill="#8b5cf6" />
                <!-- Eyes Background -->
                <g class="blob-eyes-bg">
                  <circle cx="37" cy="40" r="6" fill="#fff" />
                  <circle cx="63" cy="40" r="6" fill="#fff" />
                </g>
                <!-- Pupils -->
                <g class="blob-eyes">
                  <circle cx="37" cy="40" r="3" fill="#2d3748" />
                  <circle cx="63" cy="40" r="3" fill="#2d3748" />
                </g>
                <!-- Mouth -->
                <line x1="47" y1="52" x2="53" y2="52" stroke="#2d3748" stroke-width="2.5" stroke-linecap="round" />
                <!-- Hands -->
                <circle class="blob-hand-l" cx="15" cy="70" r="8" fill="#8b5cf6" stroke="#2d3748" stroke-width="1.5" />
                <circle class="blob-hand-r" cx="85" cy="70" r="8" fill="#8b5cf6" stroke="#2d3748" stroke-width="1.5" />
              </svg>
            </div>

            <input type="password" id="password" class="form-input" placeholder=" " required>
            <label for="password" class="form-label">Password</label>
            <button type="button" class="toggle-password" data-target="password">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>

          <div class="form-group password-group" id="confirm-password-group">
            <input type="password" id="confirm-password" class="form-input" placeholder=" " required>
            <label for="confirm-password" class="form-label">Confirm Password</label>
            <button type="button" class="toggle-password" data-target="confirm-password">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>

          <div class="form-options" id="form-options" style="justify-content: flex-end;">
            <span class="forgot-password" style="font-size: 0.8rem;">By signing up, you agree to our Terms.</span>
          </div>

          <!-- Log in Button with Peeking Character -->
          <div class="button-character-wrapper" style="position: relative; margin-top: 1.5rem;" onmouseenter="this.querySelector('.peek-character').style.transform = 'translateY(-100%)'" onmouseleave="this.querySelector('.peek-character').style.transform = 'translateY(0)'">
            <div class="peek-character-container" style="position: absolute; bottom: calc(100% - 6px); left: 25px; width: 60px; height: 48px; overflow: hidden; pointer-events: none; z-index: 2;">
              <svg class="peek-character" viewBox="0 0 100 80" width="60" height="48" style="position: absolute; top: 100%; left: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                <!-- Body -->
                <path d="M20 80 C20 30, 35 10, 50 10 C65 10, 80 30, 80 80 Z" fill="#ff9838" stroke="#2d3748" stroke-width="2.5" />
                <!-- Highlight -->
                <path d="M28 75 C28 40, 40 20, 50 20 C60 20, 72 40, 72 75" fill="none" stroke="#ffcf9e" stroke-width="4" stroke-linecap="round" opacity="0.5" />
                <!-- Cheeks -->
                <ellipse cx="32" cy="60" rx="8" ry="4" fill="#ff6b6b" opacity="0.8" />
                <ellipse cx="68" cy="60" rx="8" ry="4" fill="#ff6b6b" opacity="0.8" />
                <!-- Left Eye -->
                <circle cx="38" cy="50" r="10" fill="#2d3748" />
                <circle cx="41" cy="47" r="3.5" fill="#fff" />
                <circle cx="36" cy="53" r="1.5" fill="#fff" />
                <!-- Right Eye -->
                <circle cx="62" cy="50" r="10" fill="#2d3748" />
                <circle cx="65" cy="47" r="3.5" fill="#fff" />
                <circle cx="60" cy="53" r="1.5" fill="#fff" />
                <!-- Mouth -->
                <path d="M46 60 Q50 65 54 60" fill="none" stroke="#2d3748" stroke-width="3" stroke-linecap="round" />
                <!-- Left Hand -->
                <path d="M14 80 C14 65, 32 65, 32 80 Z" fill="#ff8a3d" stroke="#2d3748" stroke-width="2.5" />
                <!-- Right Hand -->
                <path d="M68 80 C68 65, 86 65, 86 80 Z" fill="#ff8a3d" stroke="#2d3748" stroke-width="2.5" />
              </svg>
            </div>
            <button type="submit" class="login-submit-btn" style="position: relative; z-index: 1; margin-top: 0;">Sign Up</button>
          </div>
          
          <!-- Google Button with Peeking Character -->
          <div class="button-character-wrapper" style="position: relative; margin-top: 1rem;" onmouseenter="this.querySelector('.peek-character').style.transform = 'translateY(-100%)'" onmouseleave="this.querySelector('.peek-character').style.transform = 'translateY(0)'">
            <div class="peek-character-container" style="position: absolute; bottom: calc(100% - 6px); right: 25px; width: 60px; height: 48px; overflow: hidden; pointer-events: none; z-index: 2;">
              <svg class="peek-character" viewBox="0 0 100 80" width="60" height="48" style="position: absolute; top: 100%; left: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                <!-- Body -->
                <path d="M20 80 C20 30, 35 10, 50 10 C65 10, 80 30, 80 80 Z" fill="#ff9838" stroke="#2d3748" stroke-width="2.5" />
                <!-- Highlight -->
                <path d="M28 75 C28 40, 40 20, 50 20 C60 20, 72 40, 72 75" fill="none" stroke="#ffcf9e" stroke-width="4" stroke-linecap="round" opacity="0.5" />
                <!-- Cheeks -->
                <ellipse cx="32" cy="60" rx="8" ry="4" fill="#ff6b6b" opacity="0.8" />
                <ellipse cx="68" cy="60" rx="8" ry="4" fill="#ff6b6b" opacity="0.8" />
                <!-- Left Eye -->
                <circle cx="38" cy="50" r="10" fill="#2d3748" />
                <circle cx="41" cy="47" r="3.5" fill="#fff" />
                <circle cx="36" cy="53" r="1.5" fill="#fff" />
                <!-- Right Eye -->
                <circle cx="62" cy="50" r="10" fill="#2d3748" />
                <circle cx="65" cy="47" r="3.5" fill="#fff" />
                <circle cx="60" cy="53" r="1.5" fill="#fff" />
                <!-- Mouth -->
                <path d="M46 60 Q50 65 54 60" fill="none" stroke="#2d3748" stroke-width="3" stroke-linecap="round" />
                <!-- Left Hand -->
                <path d="M14 80 C14 65, 32 65, 32 80 Z" fill="#ff8a3d" stroke="#2d3748" stroke-width="2.5" />
                <!-- Right Hand -->
                <path d="M68 80 C68 65, 86 65, 86 80 Z" fill="#ff8a3d" stroke="#2d3748" stroke-width="2.5" />
              </svg>
            </div>
            <button type="button" class="login-google-btn" style="position: relative; z-index: 1; margin-top: 0;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.04c0-.85-.08-1.66-.2-2.44H12v4.62h5.1c-.22 1.48-.88 2.74-1.93 3.58v2.96h3.11C20.1 19.05 21 15.82 21 12.04z" fill="#4285F4" stroke="none"/>
                <path d="M12 21.24c2.53 0 4.65-.84 6.2-2.27l-3.11-2.96c-.84.56-1.92.89-3.1.89-2.38 0-4.4-1.6-5.11-3.76H3.7v3.05C5.26 19.33 8.35 21.24 12 21.24z" fill="#34A853" stroke="none"/>
                <path d="M6.89 13.14c-.18-.56-.29-1.16-.29-1.78s.11-1.22.29-1.78V6.53H3.7C3.06 7.82 2.7 9.3 2.7 10.86s.36 3.04 1 4.33l3.19-2.05z" fill="#FBBC05" stroke="none"/>
                <path d="M12 4.76c1.38 0 2.62.47 3.59 1.4l2.69-2.69C16.64 1.93 14.52 1.1 12 1.1 8.35 1.1 5.26 3.01 3.7 6.09l3.19 3.05C7.6 6.98 9.62 5.38 12 5.38z" fill="#EA4335" stroke="none"/>
              </svg>
              Sign Up with Google
            </button>
          </div>
        </form>

        <div class="login-footer">
          Already have an account? <a href="login.html">Log In</a>
        </div>
      </div>
    </div>
  </div>
  <script>
    // --- Draggable Blob Logic ---
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');
    const passInput = document.getElementById('password');
    const confirmPassInput = document.getElementById('confirm-password');
    const togglePassBtns = document.querySelectorAll('.toggle-password');
    const leftEyes = document.querySelector('#blob-left .blob-eyes');
    const rightEyes = document.querySelector('#blob-right .blob-eyes');
    const authError = document.getElementById('auth-error');
    const authErrorText = document.getElementById('auth-error-text');
    
    // Initialize GSAP Draggable for the blobs
    Draggable.create(".blob-character", {
      type: "x,y",
      onPress: function() {
        gsap.to(this.target, { scale: 1.1, duration: 0.2 });
        // Stop any current return flights if the user grabs them mid-air!
        gsap.killTweensOf(this.target, "x,y");
      },
      onRelease: function() {
        const el = this.target;
        const rect = el.getBoundingClientRect();
        
        // Calculate distance to the bottom of the visible screen
        let fallDistance = window.innerHeight - rect.bottom - 10;
        if (fallDistance < 0) fallDistance = 0; // Prevent upward falling
        
        const targetY = this.y + fallDistance;

        // 1. Fall down with realistic gravity bounce
        gsap.to(el, { 
          y: targetY, 
          duration: 1.2, 
          ease: "bounce.out",
          onComplete: () => {
            // 2. Fly rapidly back to their original assigned position
            gsap.to(el, {
              x: 0,
              y: 0,
              duration: 1,
              ease: "elastic.out(1, 0.7)",
              delay: 0.3
            });
          }
        });
        
        gsap.to(el, { scale: 1, duration: 0.2 });
      }
    });

    let isPasswordVisible = false;
    let mouseTimeout;

    // Function to determine where the eyes should look when the mouse stops moving
    function updateIdleEyes() {
      const active = document.activeElement;
      if (active === phoneInput || active === nameInput) {
        const length = Math.min(active.value.length, 25);
        const leftX = 4 + (length / 25) * 3;
        const rightX = -7 + (length / 25) * 3;
        gsap.to(leftEyes, { x: leftX, y: -6, duration: 0.2 });
        gsap.to(rightEyes, { x: rightX, y: -6, duration: 0.2 });
      } else if ((active === passInput || active === confirmPassInput) && isPasswordVisible) {
        // Look directly at the visible password
        gsap.to(leftEyes, { x: 5, y: 0, duration: 0.2 });
        gsap.to(rightEyes, { x: -5, y: 0, duration: 0.2 });
      } else {
        // Look forward (idle)
        gsap.to('.blob-eyes', { x: 0, y: 0, duration: 0.2 });
      }
    }

    // 1. Mouse & Touch Tracking
    function handlePointerMove(e) {
      const active = document.activeElement;
      if ((active === passInput || active === confirmPassInput) && !isPasswordVisible) return;

      clearTimeout(mouseTimeout);
      
      let clientX = e.clientX;
      let clientY = e.clientY;
      
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      }
      
      // Calculate global position mapped to a -5 to +5 pixel range for the pupils
      const moveX = (clientX / window.innerWidth) * 10 - 5;
      const moveY = (clientY / window.innerHeight) * 10 - 5;
      
      gsap.to('.blob-eyes', { x: moveX, y: moveY, duration: 0.1 });

      // After 500ms of no movement, revert to idle logic (look at input or forward)
      mouseTimeout = setTimeout(updateIdleEyes, 500);
    }

    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('touchmove', handlePointerMove);

    // 2. Input Focus
    [nameInput, phoneInput].forEach(input => {
      input.addEventListener('focus', updateIdleEyes);
      input.addEventListener('input', updateIdleEyes);
      input.addEventListener('blur', updateIdleEyes);
    });

    // 3. Password Focus
    [passInput, confirmPassInput].forEach(input => {
      input.addEventListener('focus', () => {
        updateIdleEyes();
        if (!isPasswordVisible) {
          gsap.to('.blob-hand-l', { x: 18, y: -25, duration: 0.4, ease: 'back.out(1.5)' });
          gsap.to('.blob-hand-r', { x: -18, y: -25, duration: 0.4, ease: 'back.out(1.5)' });
        }
      });
      input.addEventListener('blur', () => {
        updateIdleEyes();
        const active = document.activeElement;
        // Only put hands down if not moving to the other password field
        if (active !== passInput && active !== confirmPassInput) {
          gsap.to(['.blob-hand-l', '.blob-hand-r'], { x: 0, y: 0, duration: 0.4, ease: 'power2.out' });
        }
      });
    });

    // 4. Toggle Password Visibility
    togglePassBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        const targetInput = document.getElementById(targetId);
        
        if (targetInput.type === 'password') {
          targetInput.type = 'text';
          isPasswordVisible = true;
          updateIdleEyes();
          
          if (document.activeElement === targetInput) {
            gsap.to('.blob-hand-l', { y: -15, duration: 0.3, ease: 'power2.out' });
            gsap.to('.blob-hand-r', { y: -15, duration: 0.3, ease: 'power2.out' });
          }
        } else {
          targetInput.type = 'password';
          isPasswordVisible = (passInput.type === 'text' || confirmPassInput.type === 'text');
          
          if (document.activeElement === targetInput) {
            gsap.to('.blob-hand-l', { x: 18, y: -25, duration: 0.3, ease: 'back.out(1.5)' });
            gsap.to('.blob-hand-r', { x: -18, y: -25, duration: 0.3, ease: 'back.out(1.5)' });
          }
        }
      });
    });

    // --- Sign Up Form Submission ---
    const loginForm = document.querySelector('.login-form');

    if (loginForm) {
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault(); 
        
        const btn = document.querySelector('.login-submit-btn');

        // Validation Error UI
        if (passInput.value !== confirmPassInput.value) {
          authErrorText.textContent = "Passwords do not match.";
          authError.style.display = "flex";
          // Shake animation
          gsap.fromTo(authError, { x: -5 }, { x: 5, duration: 0.05, yoyo: true, repeat: 5 });
          return;
        }
        
        authError.style.display = "none";
        
        // Simulate registration
        localStorage.setItem('kadUser', JSON.stringify({
          name: nameInput.value,
          phone: phoneInput.value
        }));
        localStorage.setItem('isLoggedIn', 'true');
        
        btn.textContent = 'Creating Account...';
        btn.style.opacity = '0.8';
        
        setTimeout(() => {
          window.location.href = 'account.html'; 
        }, 800);
      });
    }
  </script>
</body>
</html>
